body:
  text: 右唐賢首國師述夫華嚴宗旨其義不一究其了說總明因果二門因即普賢行願果即舍那業用此諸界為體緣起為用體用全收圓通一際語其所以不出緣起以義回轉鎔達有空隨智鑑用即說多門隨體湛宗即說一義若論玄旨一多不可然以不為了一不多為了多恆存常空常有大況如此粗陳梗概今就要義略申問答但述大意餘屬經文庶得道君子探其趣焉一徵普眼二明理事三辨正因四融大小五結成壞六通二界七明隱顯八明因果九達色空一徵普眼問眼色相依應有其事根塵和合其旨非無緣會現時云何得不𫮧境云何方名普眼私答曰五緣為因稱眼為果若緣發現即以緣名為眼若以因沒果中緣皆號眼然則全色為眼恆見而無緣全眼為色恆稱見而非我非我離於情想無緣絶於貪求收萬象於目前全十方於眼際是以緣義無盡隨見見而不究物性難見思應法法而難准十法則眼普義通乃見通體久自隱隱照之遂重重然究十方於眼際鏡空有而皎明收萬象以成身現理事而通徹謹對二明理事問緣起事相分齊歷然法界理性無有所若以存壞一體用不巧亦通事理收為不二為祛茲弊庶皎玄宗私對緣起事相必收性而方成法界玄宗亦依緣而現空有有交徹體用玄通言事即有徹空源談有乃空透有表或時雙奪纖毫之論不具或時相成廣大之談並見現全收事全奪事而為理事非別事物具理而為事何方空隨有現理遂事彰一際通觀萬物可定者矣謹對三辨正因問今時修道入行必應見佛求法從因至果函蓋相依若見三十二相為因遂即無相可覩若詮一空為因後恐理事懸別請辨其佛之因希聞成佛之果私對佛以無生空寂為身亦以法界無起為體但證此理佛隨理以現身但入無生法隨智以顯相相即無相色身未足失理無則不無空門何得為實久離寂默三世之所未審當已去色聲六根之所罕接然後證心內照理成佛亦同成靜息外緣智就法亦同就因滿即果克發心已成正覺之基果滿即因成得道蓋自初心之本何必全因至果恐招所得之基全理事將涉有性之論謹對四融大小問有大有小相狀歷然一廣一陜事物差別若以小收大或恐大失本形若以大收小亦恐小傷無質寬隘即其不等出入何得相容遮却蒙雲皎斯智日私對大必收小方得名大小必容大乃得小稱各無自性大小所以相容並不竟成廣陜以之齊納是知大是小大小是大小小無定性終自遍於十方大非定形歷劫皎於一世則知小時正大芥子納於須彌大時正小海水納於毛孔若不各壞性出入何得不備又以皆存本形舒卷自然無礙謹對五結成壞問成壞之義其勢雖明差別異陳復乖其致今者成時壞居何所壞時成在何方若異聖乃不容若同凡又不信請以珠玉來酬祛茲瓦礫私對壞即成處壞亦壞即成法界空而恆有存壞即有徹於空壞實存即空彰於有表然後異亦不異同體之自皎明迷之自蒙昧若以性端結空有二邊若以智照來通成壞一際謹對六通二界問衆生為迷諸佛為悟體雖是一約用有差若以衆生通佛諸佛合迷若以佛通衆生衆生合悟冀拂塵鏡以顯大明庶闢玄關開為暗室私對曰恆以非衆生為衆生亦非諸佛為諸佛不礙約存而恆奪不妨壞而常成隨緣具立衆生之名豈有衆生可得約體權施法身之號寧有諸佛可求莫不妄徹真源居一相而恆有真該妄末入五道而常空情該則二界難通智說乃一如易說然後雙非雙立互成見諸佛於衆生身觀衆生於佛體七明隱顯問隱顯之義旨趣難原依空色以通玄約一多而顯密若顯時有隱觀色即合見空若隱時有顯見寂應常覩動請開法藏此智珠私對此能攝即此云彼若收此亦此顯彼隱隱在即是顯在顯時正是隱時一壞全攝多成此顯全收彼隱法體而恆明明亦非顯佛動而常寂寂亦非隱隱由顯立法界開乎緣起中顯由隱成萬物鏡於一空之上然見空即是見色了妄即是了真詎歷八萬體心之首謹對八明因果問因果相依其猶函蓋若從因獲果即果成異於因時若即因是果衆生同於佛地不得稱為斷德茲又落常幸旨迷方開斯正路私對曰因果二位同一緣起相因成立義不孤興因徹果源果究因末普賢行願方號圓因舍那十身遂稱滿果然則法無前後隨了處而因圓佛雖斷常遂悟時而理現果果非是得因亦不亡猶是發心方驗果究因際菩薩已成正覺即知因源果位相望自招斷常之失同體一解復招體用之識自可緣起門中許因相即法界證處果異預談九達色空問緣起事分齊差別法界空理離於限量一通一礙自在之義有乖或隱或顯融會之端莫準欲使力齊一味義顯同源希聽德音願開高唱私對色攬空成如動波之收水事含理就似金器此隨形色依空立空約色明互奪則二義必亡互成則兩門俱現現時即隱故觀色而常空空時即顯故觀空而恆色色既非色空亦非空互有力而互無互相成而互奪故無生之義遂彰由相成故緣起之門乃現色無自性舉體全空空無自體舉空全色色空無二圓通一際更使一通一礙溥在相而未融有隱解在性而方中謹對維時明治二十四年卯五月南山留學之際撿出此書於釋迦文院寶庫偶接悲母四大不順之急報欲直下山看病乃祈平愈于三寶奉速寫畢南都唐招提寺末資五月十七日求律沙門智海五夏
